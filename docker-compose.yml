services:
  postgres:
    image: postgres:16-alpine
    container_name: jarga_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jarga_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    command: postgres -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg_backup:
    image: postgres:16-alpine
    container_name: jarga_pg_backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: jarga_dev
      BACKUP_RETAIN: 24
    volumes:
      - postgres_backups:/backups
      - ./infra/docker/pg-backup.sh:/usr/local/bin/pg-backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "0 * * * * /usr/local/bin/pg-backup.sh" | crontab -
        echo "pg_backup: running initial backup..."
        /usr/local/bin/pg-backup.sh
        echo "pg_backup: cron scheduled (hourly). Waiting..."
        crond -f -l 2

  neo4j:
    image: neo4j:5-community
    container_name: perme8_neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  postgres_backups:
  neo4j_data:
